# Lightweight PR / main checks (no signing, no release upload).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  analyze-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
